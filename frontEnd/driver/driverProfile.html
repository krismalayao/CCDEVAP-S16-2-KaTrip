<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KaTrip - Driver Profile</title>
        <link rel="stylesheet" href="../style/style.css">
        <link rel="stylesheet" href="../style/navbar.css">
        <link rel="stylesheet" href="../style/userProfile.css">
        <link rel="icon" type="image/svg+xml" href="../src/images/katrip_logo.svg">
    </head>
    <body class="driver-profile-body">
        <div id="navbar-mount"></div>

        <div class="profile-container">
            <section class="profile-heading">
                <!-- Theme Toggle -->
                <div class="theme-toggle">
                    <label class="theme-switch">
                        <input type="checkbox" id="theme-toggle-checkbox">
                        <span class="theme-slider"></span>
                    </label>
                </div>

                <!-- Profile Icon -->
                <div class="profile-avatar" id="avatar-preview">
                    <label class="avatar-edit-label" for="avatar-upload">
                        <input type="file" id="avatar-upload" accept="image/*">
                    </label>
                </div>
                
                <div class="name-display">
                    <h2>Juan Dela Rosa</h2>
                </div>
            </section>
            <section class="profile-details">
                <!-- Phone Number Input -->
                <div class="profile-field-group">
                    <label for="profile-phone">Number</label>
                    <div class="profile-input-wrapper">
                        <input type="text" id="profile-phone" value="0987 654 3210">
                        <button class="profile-field-edit-btn" aria-label="Edit number"></button>
                    </div>
                </div>

                <!-- Email Address Input -->
                <div class="profile-field-group">
                    <label for="profile-email">E-mail</label>
                    <div class="profile-input-wrapper">
                        <input type="email" id="profile-email" value="example@gmail.com">
                        <button class="profile-field-edit-btn" aria-label="Edit email"></button>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="profile-field-group">
                    <label for="profile-password">Password</label>
                    <div class="profile-input-wrapper">
                        <input type="password" id="profile-password" value="••••••••">
                        <button class="profile-field-edit-btn" aria-label="Edit password"></button>
                    </div>
                </div>

                <!-- Gender Input -->
                <div class="profile-field-group">
                    <label for="profile-gender">Gender</label>
                    <div class="profile-input-wrapper profile-dropdown-wrapper">
                        <select id="profile-gender">
                            <option value="Male" selected>Male</option>
                            <option value="Female">Female</option>
                            <option value="Non-Binary">Non-binary</option>
                            <option value="Others">Others</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                        <button class="profile-field-edit-btn" aria-label="Edit gender"></button>
                    </div>
                </div>

                <!-- Bottom Row: New 3-Column Layout Block -->
                <div class="profile-driver-details-row">
                    <!-- Vehicle Model -->
                    <div class="driver-profile-group">
                        <label for="profile-vehicle-model">Vehicle Model</label>
                        <div class="profile-input-wrapper">
                            <input type="text" id="profile-vehicle-model" name="vehicle-model" value="Honda City">
                            <button class="profile-field-edit-btn" aria-label="Edit vehicle model"></button>
                        </div>
                    </div>

                    <!-- License Plate -->
                    <div class="driver-profile-group">
                        <label for="profile-license-plate">License Plate</label>
                        <div class="profile-input-wrapper">
                            <input type="text" id="profile-license-plate" name="license-plate" value="ABC 1234">
                            <button class="profile-field-edit-btn" aria-label="Edit license plate"></button>
                        </div>
                    </div>

                    <!-- Driver Verification Status -->
                    <div class="driver-profile-group">
                        <label for="profile-status">Status</label>
                        <div class="profile-input-wrapper profile-status-static">
                            <span class="status-text">Approved</span>
                            <img src="../src/images/black-approved-icon.png" class="status-icon" alt="Approved Status">
                        </div>
                    </div>
                </div>

                <!-- Account Creation Date -->
                <div class="profile-metadata">
                    <p>Created at 2026-05-30</p>
                    <button type="submit" class="profile-save-btn">Save</button>
                </div>
            </section>
        </div>

        <!-- Logout Button -->
        <div class="profile-account-actions">
            <button type="button" class="profile-logout-btn" id="logout-btn">Log Out</button>
        </div>

        <script src="../components/navbar.js"></script>
        <script src="../components/profile.js"></script>
    </body>
</html>
