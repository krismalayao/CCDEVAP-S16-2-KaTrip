<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="description" content="KaTrip User Registration Page">
    <meta name="keywords" content="Register, KaTrip, User, Car Ride">
    <meta name="author" content="Team 2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KaTrip - Registration Page</title>

    <link rel="stylesheet" href="../style/style.css">
    <link rel="icon" type="image/svg+xml" href="../src/images/katrip_logo.svg">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body class="reg-body">
    <div class="reg-container">
        <div class="reg-header">
            <img src="../src/images/katrip_logo.svg">
            <h2>KaTrip</h2>
        </div>

        <form action="" method="POST">
            <div class="reg-col">
                <h2>Get Started</h2>

                <label for="phone_number">Phone Number</label>
                <div class="reg-phone-feature">
                    <input type="tel" id="country_code" name="country_code" value="+63" readonly>
                    <input type="tel" id="phone_number" name="phone_number" placeholder="123-456-7890" required>
                </div>

                <label for="email">Email</label>
                <input type="email" name="email" placeholder="username@email.com" required>

                <label for="password">Password</label>
                <div class="reg-password-feature">
                    <input type="password" id="password" name="password" placeholder="Input Password" required>

                    <button type="button" id="toggle-button" class="toggle-button">
                        <i id="toggle-icon" class="bx bxs-lock-alt"></i>
                    </button>
                </div>
            </div>

            <div class="reg-col">
                <h2>Personal Information</h2>
                <div class="reg-row">
                    <div>
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="" disabled selected>Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="non-binary">Non-binary</option>
                            <option value="others">Others</option>
                            <option value="prefer-not-to-say"> Prefer not to say</option>
                        </select>
                    </div>

                    <div>
                        <label for="birthdate">Birthdate</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                </div>

                <div class="reg-row">
                    <div>
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" placeholder="Juan" required>
                    </div>

                    <div>
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Dela Cruz" required>
                    </div>
                </div>

                <div class="reg-driver-option">
                    <input type="checkbox" id="katrip_driver" name="katrip_driver">
                    <label for="katrip_driver">Become a <b>KaTrip Driver</b><br><small>Additional Requirements are Expected</small></label>
                </div>
            </div>
        </form>

        <div class="reg-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
            <button type="submit" class="reg-button">Register</button>
        </div>
    </div>

    <script src="../script/features.js"></script>

</body>
</html>
