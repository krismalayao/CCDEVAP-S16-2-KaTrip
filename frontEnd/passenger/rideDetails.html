<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Details - KaTrip</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="icon" type="image/svg+xml" href="../src/images/katrip_logo.svg">
</head>
<body class="browserides-body">
    <div id="navbar-mount"></div>

    <div class="browserides-layout">
        <main class="browserides-main ride-details-container">
            
            <div class="back-navigation">
                <a href="browseRides.html" class="back-link">
                    &larr; Back to Browse Rides
                </a>
            </div>

            <h2 class="browserides-heading">Trip Details</h2>

            <div class="booking-card detail-card">
                <div class="booking-card-heading">
                    <span class="browserides-ride-route" id="detail-route">MANILA &rarr; ESPANA</span>
                    <span class="status-badge approved" id="detail-status">Active</span>
                </div>

                <div class="booking-route route-section">
                    <div class="route-point">
                        <span class="dot pickup"></span>
                        <strong>From:</strong> <span id="detail-pickup">Manila Terminal</span>
                    </div>
                    <div class="route-point destination-point">
                        <span class="dot destination"></span>
                        <strong>To:</strong> <span id="detail-destination">Espana, Manila</span>
                    </div>
                </div>

                <div class="browserides-ride-meta details-meta-bar">
                    <div class="browserides-meta-item">
                        <span class="browserides-meta-label">Departure Time</span>
                        <span class="browserides-meta-value" id="detail-time">7:00 am</span>
                    </div>

                    <div class="browserides-meta-item">
                        <span class="browserides-meta-label">Date</span>
                        <span class="browserides-meta-value" id="detail-date">26 MAY 2026</span>
                    </div>

                    <div class="browserides-meta-item">
                        <span class="browserides-meta-label">Available Seats</span>
                        <span class="browserides-capacity-badge badge-green" id="detail-capacity">3 / 4 Seats</span>
                    </div>
                </div>

                <div class="driver-info-snippet">
                    <div class="driver-avatar-mini"></div>
                    <div>
                        <p class="driver-name" id="detail-driver">Jose Garcia</p>
                        <small class="vehicle-plate" id="detail-vehicle">Honda City &bull; ABC 1234</small>
                    </div>
                </div>

                <div class="booking-card-footer footer-section">
                    <div>
                        <span class="browserides-meta-label fare-label">ESTIMATED FARE</span>
                        <span class="booking-price" id="detail-fare">₱92.33</span>
                    </div>
                    <button id="reserve-btn" class="contact-driver-btn reserve-action-btn">
                        Reserve a Seat
                    </button>
                </div>
            </div>

        </main>
    </div>

    <script src="../components/navbar.js"></script>
    <script src="../script/features.js"></script>
</body>
</html>
